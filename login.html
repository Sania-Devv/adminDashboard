<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOGIN</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-clifford: #da373d;
      }
    </style>
  </head>
 <body class="h-screen flex items-center justify-center bg-gray-100">

  <!-- MAIN CARD -->
  <div class="w-full max-w-5xl bg-white shadow-xl rounded-2xl overflow-hidden flex flex-col md:flex-row">

    <!-- LEFT IMAGE -->
    <div class="w-full md:w-1/2 h-64 md:h-auto">
      <img
        src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?q=80&w=1200&auto=format&fit=crop"
        class="w-full h-full object-cover"
        alt="login"
      />
    </div>


    <div class="w-full flex items-center justify-center md:w-1/2 p-4 md:p-10">

      <div class="w-full max-w-md p-10">

        <h2 class="text-3xl font-bold text-center mb-8">
         Login Form 
        </h2>

   <form id="loginForm">

        <input
          type="email"
          id="email"
          placeholder="Enter Email"
          class="w-full border p-3 rounded-lg mb-4 outline-none "
        />

        
        <input
          type="password"
          id="password"
          placeholder="Enter Password"
          class="w-full border p-3 rounded-lg mb-6 outline-none "
        />

        <button
        type="submit"  
        id="loginBtn"
          class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition"
        >
          Login
        </button>
      </form>
         <p class="text-center mt-4 text-sm">
          Don’t have an account?
          <a href="signUp.html" class="text-blue-600 font-semibold">
            Sign up
          </a>
        </p>

      </div>

    </div>

  </div>
 <script src="login.js"></script>
</body>
</html>
