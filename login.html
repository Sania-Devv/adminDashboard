<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <!-- BACKGROUND: Aap in hex colors (#1e1b4b) ko apni image ke background se match kar ke change kar sakte hain -->
  <body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-500 via-purple-600 to-[#1e1b4b] p-4 sm:p-8">

    <!-- MAIN CARD -->
    <div class="w-full max-w-5xl bg-white shadow-2xl rounded-2xl overflow-hidden flex flex-col md:flex-row">

      <!-- IMAGE SIDE -->
      <!-- Mobile par iski fix height h-72 hogi takay cut na ho, desktop par ye md:h-auto ho jayegi -->
      <div class="relative w-full h-72 sm:h-80 md:h-auto md:w-1/2 bg-gray-100 flex-shrink-0">
        <!-- object-cover se image poori div ko cover karegi (top, bottom, left, right) -->
        <img
          src="./images/loginimg_no_icon.png"
          class="absolute inset-0 w-full h-full object-cover object-left-top"
          alt="login"
        />
      </div>

      <!-- FORM SIDE -->
      <div class="w-full md:w-1/2 flex items-center justify-center p-8 sm:p-12 lg:p-16">

        <div class="w-full max-w-md">

          <h2 class="text-3xl font-extrabold text-center mb-8 text-gray-800">
            Welcome Back
          </h2>

          <form id="loginForm" class="space-y-5">

            <div>
              <input
                type="email"
                name="email"
                placeholder="Enter Email"
                class="w-full border border-gray-300 p-3.5 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all bg-gray-50"
              />
            </div>

            <div>
              <input
                type="password"
                name="password"
                placeholder="Enter Password"
                class="w-full border border-gray-300 p-3.5 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all bg-gray-50"
              />
            </div>

            <button
              type="submit"
              class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold py-3.5 rounded-xl hover:opacity-90 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300"
            >
              Login
            </button>

          </form>

          <p class="text-center mt-8 text-sm text-gray-600">
            Don’t have an account?
            <a href="signUp.html" class="text-indigo-600 font-bold hover:underline transition">
              Sign up
            </a>
          </p>

        </div>

      </div>

    </div>
    <script src="login.js"></script>
  </body>
</html>
