<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @theme {
        --color-clifford: #da373d;
      }
    </style>
  </head>
  <body class="bg-gray-100">
    <div class="flex h-screen">
      <!-- SIDEBAR -->
      <aside class="w-64 bg-slate-800 text-white p-5 hidden md:block shadow-lg">
        <h1 class="text-2xl font-bold mb-8">Admin Panel</h1>

        <ul class="space-y-4">
          <li class="hover:bg-slate-700 p-2 rounded cursor-pointer transition">
            Dashboard
          </li>
          <li class="hover:bg-slate-700 p-2 rounded cursor-pointer transition">
            Users
          </li>
          <li class="hover:bg-slate-700 p-2 rounded cursor-pointer transition">
            Settings
          </li>
        </ul>
      </aside>

      <!-- MAIN -->
      <div class="flex-1 flex flex-col">
        <!-- HEADER -->
        <header
          class="bg-white shadow-md p-4 flex justify-between items-center"
        >
          <h1 class="text-xl font-semibold text-gray-800">
            Welcome to Admin Dashboard
          </h1>

          <!-- ADMIN -->
          <div class="relative">
            <div
              id="avatar"
              class="flex items-center gap-2 px-3 py-2 rounded-lg "
            >
              <i class="fa-solid fa-user"></i>
              <span class="font-medium hidden sm:block"> Admin</span>
            </div>
            <div
              id="dropdown"
              class="hidden absolute right-0 mt-2 w-40 bg-white shadow-lg rounded-lg border"
            >
              <button
                id="logoutBtn"
                class="w-full text-left px-4 py-2 "
              >
                Logout
              </button>
            </div>
          </div>
        </header>

        <!-- CONTENT -->
        <main class="p-6 flex-1 overflow-auto">
          <div class="bg-white rounded-lg shadow p-6 border border-gray-200">
            <h2 class="text-lg font-semibold text-gray-800 mb-2">
              Dashboard Overview
            </h2>

            <p class="text-gray-500">
              Manage users, roles and system data efficiently from here.
            </p>

            <div class="overflow-x-auto">
              <table class="w-full text-sm">
               <thead  class="bg-gray-100 text-gray-700 uppercase text-xs">
                 <tr></tr>
                 </thead>

                <tbody id="tableBody" class="divide-y divide-gray-100">
              
                </tbody>
              </table>
            </div>
          </div>
        </main>

        <!-- FOOTER -->
        <footer class="bg-white text-center p-3 border-t text-gray-500 text-sm">
          © 2026 Admin Dashboard | All Rights Reserved
        </footer>
      </div>
    </div>
    <script src="admin.js"></script>
  </body>
</html>
