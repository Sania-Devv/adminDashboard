<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-clifford: #da373d;
      }
    </style>
  </head>

  <body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-500 via-purple-600 to-[#1e1b4b] p-4 sm:p-8">
    <div class="w-full max-w-5xl bg-white shadow-2xl rounded-2xl overflow-hidden flex flex-col md:flex-row">
      <!-- LEFT IMAGE -->
      <div class="relative w-full h-72 sm:h-80 md:h-auto md:w-1/2 bg-gray-100 flex-shrink-0">
        <img
          src="./images/create_account.png"
          class="absolute inset-0 w-full h-full object-cover object-left-top"
          alt="signup"
        />
      </div>
      <!-- RIGHT FORM -->

      <!-- RIGHT FORM -->
      <div class="w-full md:w-1/2 flex items-center justify-center p-6 md:p-10">
        <div class="w-full max-w-md">
          <h2 class="text-3xl font-bold text-center mb-6">Signup Form</h2>

          <!--  FORM START -->
          <form id="signupForm">
            <!-- First Name -->
            <input
              type="text"
              id="firstName"
              name="firstName"
              placeholder="First Name"
              class="w-full border p-3 rounded-lg mb-3 outline-none"
            />

            <!-- Last Name -->
            <input
              type="text"
              id="lastName"
              name="lastName"
              placeholder="Last Name"
              class="w-full border p-3 rounded-lg mb-3 outline-none"
            />

            <!-- Email -->
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Email"
              class="w-full border p-3 rounded-lg mb-3 outline-none"
            />

            <!-- Password -->
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Password"
              class="w-full border p-3 rounded-lg mb-3 outline-none"
            />

            <!-- Confirm Password -->
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="Confirm Password"
              class="w-full border p-3 rounded-lg mb-3 outline-none"
            />

            <!-- Role Dropdown -->
            <select
              id="role"
              name="role"
              class="w-full border p-3 rounded-lg mb-5 outline-none"
            >
              <option value="admin">Admin</option>
            </select>

            <!-- Signup Button -->
            <button
              type="submit"
              id="signupBtn"
              class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold py-3.5 rounded-xl hover:opacity-90 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300"
            >
              Signup
            </button>
          </form>
         

          <!-- Login Link -->
          <p class="text-center mt-4 text-sm">
            Already have an account?
            <a href="index.html" class="text-blue-600 font-semibold">Login</a>
          </p>
        </div>
      </div>
    </div>
    <script src="signup.js"></script>
  </body>
</html>
