<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-clifford: #da373d;
      }
    </style>
  </head>

  <body class="h-screen flex items-center justify-center bg-gray-100">
    <div
      class="w-full max-w-5xl bg-white shadow-xl rounded-2xl overflow-hidden flex flex-col md:flex-row"
    >
      <!-- LEFT IMAGE -->
      <div class="w-full md:w-1/2 h-64 md:h-auto">
        <img
          src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?q=80&w=1200&auto=format&fit=crop"
          class="w-full h-full object-cover p-8"
          alt="signup"
        />
      </div>
      <!-- RIGHT FORM -->
      <div class="w-full md:w-1/2 flex items-center justify-center p-6 md:p-10">
        <div class="w-full max-w-md">
          <h2 class="text-3xl font-bold text-center mb-6">Signup Form</h2>

          <!-- First Name -->
          <input
            type="text"
            id="firstName"
            placeholder="First Name"
            class="w-full border p-3 rounded-lg mb-3 outline-none"
          />

          <!-- Last Name -->
          <input
            type="text"
            id="lastName"
            placeholder="Last Name"
            class="w-full border p-3 rounded-lg mb-3 outline-none"
          />

          <!-- Email -->
          <input
            type="email"
            id="email"
            placeholder="Email"
            class="w-full border p-3 rounded-lg mb-3 outline-none"
          />

          <!-- Password -->
          <input
            type="password"
            id="password"
            placeholder="Password"
            class="w-full border p-3 rounded-lg mb-3 outline-none"
          />

          <!-- Confirm Password -->
          <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password"
            class="w-full border p-3 rounded-lg mb-3 outline-none"
          />

          <!-- Role Dropdown -->
          <select
            id="role"
            class="w-full border p-3 rounded-lg mb-5 outline-none"
          >
            <option value="admin">Admin</option>
          </select>

          <!-- Signup Button -->
          <button
            id="signupBtn"
            class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-green-700 transition"
          >
            Signup
          </button>

          <!-- Login Link -->
          <p class="text-center mt-4 text-sm">
            Already have an account?
            <a href="login.html" class="text-blue-600 font-semibold"> Login </a>
          </p>
        </div>
      </div>
    </div>
    <script src="signup.js"></script>
  </body>
</html>
